<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SITE CREATOR</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #222; color: #fff; }
        .pane { padding: 1rem; border: 1px solid #444; }
        #palette { width: 20%; background: #333; }
        #workspace { width: 40%; background: #444; overflow-y: auto; }
        #stage { width: 40%; background: white; }
        iframe { width: 100%; height: 100%; border: none; }
        .block { background: #555; padding: 10px; margin: 5px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="palette" class="pane">
        <h3>Palette</h3>
        <div class="block" onclick="addBlock('text', 'Hello World')">Text</div>
        <div class="block" onclick="addBlock('picture', 'https://i.imgur.com/2sL7OqW.jpg')">Picture</div>
        <div class="block" onclick="addBlock('css', 'body { background: #300 !important; }')">Red BG</div>
    </div>
    <div id="workspace" class="pane">
        <h3>Workspace</h3>
        <div id="stack"></div>
        <button onclick="clearBlocks()">Clear</button>
    </div>
    <div id="stage" class="pane">
        <iframe id="preview"></iframe>
    </div>

    <script>
        function addBlock(type, value) {
            let active = JSON.parse(localStorage.getItem('_activeBlocks') || '[]');
            let blocks = JSON.parse(localStorage.getItem('_blocks') || '{}');
            let id = 'b' + Date.now();
            blocks[id] = {type, value};
            active.push(id);
            localStorage.setItem('_blocks', JSON.stringify(blocks));
            localStorage.setItem('_activeBlocks', JSON.stringify(active));
            updatePreview();
        }

        function clearBlocks() {
            localStorage.setItem('_activeBlocks', '[]');
            updatePreview();
        }

        function updatePreview() {
            const preview = document.getElementById('preview');
            preview.srcdoc = `
                <html>
                <head><style>${getPreviewCss()}</style></head>
                <body>${getPreviewHtml()}</body>
                </html>
            `;
            const stack = document.getElementById('stack');
            stack.innerHTML = JSON.parse(localStorage.getItem('_activeBlocks') || '[]').map(id => `<div class="block">${id}</div>`).join('');
        }

        function getPreviewCss() {
            let css = '';
            const active = JSON.parse(localStorage.getItem('_activeBlocks') || '[]');
            const blocks = JSON.parse(localStorage.getItem('_blocks') || '{}');
            active.forEach(id => { if(blocks[id] && blocks[id].type === 'css') css += blocks[id].value; });
            return css;
        }

        function getPreviewHtml() {
            let html = '';
            const active = JSON.parse(localStorage.getItem('_activeBlocks') || '[]');
            const blocks = JSON.parse(localStorage.getItem('_blocks') || '{}');
            active.forEach(id => { 
                const b = blocks[id];
                if (!b) return;
                if (b.type === 'text') html += `<div>${b.value}</div>`;
                else if (b.type === 'picture') html += `<img src="${b.value}" width="100">`;
            });
            return html;
        }

        updatePreview();
    </script>
</body>
</html>

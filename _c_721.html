<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SITE CREATOR PRO</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #1a1a1a; color: #fff; }
        .pane { padding: 10px; border: 1px solid #333; overflow-y: auto; }
        #palette { width: 15%; background: #222; }
        #workspace { width: 45%; background: #2c2c2c; }
        #stage { width: 40%; background: white; }
        .block { background: #444; padding: 10px; margin: 5px; cursor: grab; border: 1px solid #666; border-radius: 4px; }
        .block.dragging { opacity: 0.5; }
        iframe { width: 100%; height: 100%; border: none; }
        .config-btn { font-size: 10px; cursor: pointer; float: right; }
    </style>
</head>
<body>
    <div id="palette" class="pane">
        <h3>Palette</h3>
        <div class="block" draggable="true" ondragstart="drag(event)" data-type="text">Text Block</div>
        <div class="block" draggable="true" ondragstart="drag(event)" data-type="picture">Picture Block</div>
        <div class="block" draggable="true" ondragstart="drag(event)" data-type="redirect">Redirect Block</div>
    </div>
    <div id="workspace" class="pane" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h3>Workspace</h3>
        <div id="stack"></div>
        <button onclick="clearBlocks()">Clear</button>
        <button onclick="exportHtml()">Convert to HTML</button>
    </div>
    <div id="stage" class="pane">
        <iframe id="preview"></iframe>
    </div>

    <script>
        let _st = JSON.parse(localStorage.getItem('_st') || '[]');
        let _d = JSON.parse(localStorage.getItem('_d') || '{}');

        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("type", ev.target.dataset.type); }
        function drop(ev) {
            ev.preventDefault();
            const type = ev.dataTransfer.getData("type");
            const id = 'b' + Date.now();
            _st.push(id);
            _d[id] = { type, text: 'New ' + type, url: '', css: '' };
            save();
            render();
        }

        function save() {
            localStorage.setItem('_st', JSON.stringify(_st));
            localStorage.setItem('_d', JSON.stringify(_d));
            updatePreview();
        }

        function edit(id) {
            const b = _d[id];
            const t = prompt("Text/Value:", b.text);
            const u = prompt("URL/CSS (if applicable):", b.url);
            if(t !== null) b.text = t;
            if(u !== null) b.url = u;
            save(); render();
        }

        function render() {
            const s = document.getElementById('stack');
            s.innerHTML = '';
            _st.forEach(id => {
                const b = _d[id];
                const el = document.createElement('div');
                el.className = 'block';
                el.innerHTML = `${b.text} <button class="config-btn" onclick="edit('${id}')">Edit</button>`;
                s.appendChild(el);
            });
        }

        function updatePreview() {
            const p = document.getElementById('preview');
            let h = '<html><body>';
            _st.forEach(id => {
                const b = _d[id];
                if(b.type === 'text') h += `<div style="${b.url}">${b.text}</div>`;
                if(b.type === 'picture') h += `<img src="${b.text}" width="100">`;
                if(b.type === 'redirect') h += `<a href="${b.url}">${b.text}</a><br>`;
            });
            p.srcdoc = h + '</body></html>';
        }

        function exportHtml() {
            const p = document.getElementById('preview').srcdoc;
            const blob = new Blob([p], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'site.html';
            a.click();
        }

        render(); updatePreview();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SITE CREATOR</title>
    <link rel="stylesheet" href="style.css">
    <script src="_s_912.js"></script>
    <style>
        body { background: #111; color: white; display: flex; flex-direction: column; align-items: center; padding: 2rem; font-family: monospace; }
        .box { border: 1px solid white; padding: 1rem; margin: 1rem; width: 400px; }
        .block-btn { display: block; margin: 5px 0; width: 100%; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>SITE CREATOR</h1>
    <div class="box">
        <h3>Programmer Mode (Define Block)</h3>
        <input type="text" id="bName" placeholder="Name">
        <select id="bType">
            <option value="css">CSS</option>
            <option value="text">Text</option>
            <option value="picture">Picture</option>
            <option value="redirect">Redirect</option>
        </select>
        <input type="text" id="bVal" placeholder="Value (URL/CSS/Text)">
        <button onclick="saveBlock()">Save Custom Block</button>
    </div>
    <div class="box">
        <h3>Simple Mode (Add Presets)</h3>
        <div id="blockList"></div>
        <button onclick="clearBlocks()" style="margin-top:10px;">Clear Active</button>
    </div>
    <a href="hamsters.html" style="color:gray;">Return</a>

    <script>
        function saveBlock() {
            const name = document.getElementById('bName').value;
            const type = document.getElementById('bType').value;
            const val = document.getElementById('bVal').value;
            let blocks = JSON.parse(localStorage.getItem('_blocks') || '{}');
            blocks[name] = {type, value: val};
            localStorage.setItem('_blocks', JSON.stringify(blocks));
            location.reload();
        }
        function applyBlock(name) {
            let active = JSON.parse(localStorage.getItem('_activeBlocks') || '[]');
            active.push(name);
            localStorage.setItem('_activeBlocks', JSON.stringify(active));
            location.reload();
        }
        function clearBlocks() {
            localStorage.setItem('_activeBlocks', '[]');
            location.reload();
        }
        
        const list = document.getElementById('blockList');
        
        // Add Presets
        Object.keys(_presets).forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'block-btn';
            btn.innerText = name + " (Preset)";
            btn.onclick = () => applyBlock(name);
            list.appendChild(btn);
        });

        // Add Custom Blocks
        const allBlocks = JSON.parse(localStorage.getItem('_blocks') || '{}');
        Object.keys(allBlocks).forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'block-btn';
            btn.innerText = name + " (" + allBlocks[name].type + ")";
            btn.onclick = () => applyBlock(name);
            list.appendChild(btn);
        });
    </script>
</body>
</html>

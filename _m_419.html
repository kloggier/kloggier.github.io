<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BLACK MARKET</title>
    <link rel="stylesheet" href="style.css">
    <script src="_s_912.js"></script>
    <style>
        body { background: black; color: #ef4444; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
        .item { border: 1px solid red; padding: 1rem; margin: 1rem; width: 300px; text-align: center; }
    </style>
</head>
<body>
    <h1>BLACK MARKET</h1>
    <p>Coins: <span id="_coins">0</span></p>
    <div class="item">
        <p>Uncanny Filter (20 coins)</p>
        <button onclick="buy('filter')">Buy</button>
    </div>
    <div class="item">
        <p>Site Creator Access (100 coins)</p>
        <button onclick="buy('creator')">Buy</button>
        <button id="_cBtn" style="display:none; background:green;" onclick="window.location.href='_c_721.html'">Enter Creator</button>
    </div>
    <a href="hamsters.html" style="color:white;">Return to safety</a>

    <script>
        document.getElementById('_coins').innerText = getVaultData().coins;
        if(getVaultData().state['creator_access']) document.getElementById('_cBtn').style.display = 'inline-block';
        
        function buy(item) {
            let k = getVaultData();
            let cost = item === 'filter' ? 20 : 100;
            if (k.coins >= cost) {
                localStorage.setItem('_c', (k.coins - cost).toString());
                if (item === 'creator') unlock('creator_access');
                alert("Purchased " + item);
                location.reload();
            } else {
                alert("Not enough coins!");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Tetris - Survival Challenge</title>
    <link rel="stylesheet" href="style.css">
    <script src="achievements.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .game-container {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            padding: 2rem;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 1rem;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        canvas {
            border: 4px solid #334155;
            background-color: #000;
            border-radius: 4px;
        }
        .info-panel {
            min-width: 200px;
        }
        h2 { color: #ef4444; margin-top: 0; }
        .stat { margin-bottom: 1rem; font-size: 1.2rem; }
        .controls-list {
            background: #334155;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 2rem;
        }
        .controls-list h3 { margin-top: 0; font-size: 1rem; border-bottom: 1px solid #475569; padding-bottom: 0.5rem; }
        .controls-list ul { list-style: none; padding: 0; margin: 0.5rem 0 0; }
        .controls-list li { margin-bottom: 0.25rem; font-family: monospace; }
        .win-msg {
            position: absolute;
            background: rgba(0,0,0,0.9);
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .win-msg h1 { font-size: 4rem; color: #10b981; }
        .btn-exit {
            background: #10b981;
            color: white;
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: bold;
            font-size: 1.5rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div id="winScreen" class="win-msg">
        <h1>YOU SURVIVED!</h1>
        <p>The hamsters are pleased... for now.</p>
        <a href="index.html" class="btn-exit">Return to Safety</a>
    </div>

    <div class="game-container">
        <canvas id="tetris" width="240" height="480"></canvas>
        
        <div class="info-panel">
            <h2>CAT TETRIS</h2>
            <div class="stat">Lines: <span id="lines">0</span> / 10</div>
            <p>Clear 10 lines to escape.</p>
            
            <div class="controls-list">
                <h3>CONTROLS</h3>
                <ul>
                    <li>Move: Arrows / WASD</li>
                    <li>Rotate: Up / W</li>
                    <li>Drop: Down / S</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const linesElement = document.getElementById('lines');
        const winScreen = document.getElementById('winScreen');

        const catImg = new Image();
        catImg.src = 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&q=80&w=100';

        function createArena(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function createPiece(type) {
            if (type === 'I') {
                return [
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                ];
            } else if (type === 'L') {
                return [
                    [0, 2, 0],
                    [0, 2, 0],
                    [0, 2, 2],
                ];
            } else if (type === 'J') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [3, 3, 0],
                ];
            } else if (type === 'O') {
                return [
                    [4, 4],
                    [4, 4],
                ];
            } else if (type === 'Z') {
                return [
                    [5, 5, 0],
                    [0, 5, 5],
                    [0, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 6, 6],
                    [6, 6, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'T') {
                return [
                    [0, 7, 0],
                    [7, 7, 7],
                    [0, 0, 0],
                ];
            }
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        // Draw stretched cat image
                        // The scale is 20, so each unit is 20px
                        context.drawImage(catImg, (x + offset.x) * 20, (y + offset.y) * 20, 20, 20);
                    }
                });
            });
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.lines += rowCount;
                linesElement.innerText = player.lines;
                
                if (player.lines >= 10) {
                    unlock('tetris_win');
                    winScreen.style.display = 'flex';
                    isGameOver = true;
                }
            }
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [
                        matrix[x][y],
                        matrix[y][x],
                    ] = [
                        matrix[y][x],
                        matrix[x][y],
                    ];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function playerDrop() {
            if (isGameOver) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(offset) {
            if (isGameOver) return;
            player.pos.x += offset;
            if (collide(arena, player)) {
                player.pos.x -= offset;
            }
        }

        function playerReset() {
            const pieces = 'TJLOSZI';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) -
                           (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                // LOSE: back to start
                arena.forEach(row => row.fill(0));
                player.lines = 0;
                linesElement.innerText = player.lines;
            }
        }

        function playerRotate(dir) {
            if (isGameOver) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isGameOver = false;

        function update(time = 0) {
            if (isGameOver) return;
            const deltaTime = time - lastTime;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }
            lastTime = time;
            draw();
            requestAnimationFrame(update);
        }

        const arena = createArena(12, 24);
        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            lines: 0,
        };

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37 || event.keyCode === 65) { // Left or A
                playerMove(-1);
            } else if (event.keyCode === 39 || event.keyCode === 68) { // Right or D
                playerMove(1);
            } else if (event.keyCode === 40 || event.keyCode === 83) { // Down or S
                playerDrop();
            } else if (event.keyCode === 38 || event.keyCode === 87) { // Up or W
                playerRotate(1);
            } else if (event.keyCode === 81) { // Rotate CCW with Q
                playerRotate(-1);
            }
        });

        catImg.onload = () => {
            playerReset();
            update();
        };
    </script>
    <script>
        window.unlock = function(id) {
            let k = JSON.parse(localStorage.getItem('_v') || '{}');
            k[id] = 1;
            localStorage.setItem('_v', JSON.stringify(k));
        };
        window.forceTetrisWin = function() {
            unlock('tetris_win');
            if (typeof winScreen !== 'undefined') winScreen.style.display = 'flex';
            window.isGameOver = true;
            if (typeof requestID !== 'undefined') cancelAnimationFrame(requestID);
            console.log("Tetris win forced.");
        };
    </script>
    <script src="dvd.js"></script>
    <script src="music.js"></script>
    <script src="hacker.js"></script>
</body>
</html>

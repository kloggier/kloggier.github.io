<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE VOID</title>
    <style>
        body { background: #1a0000; color: #ff0000; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; }
        .cell { width: 100px; height: 100px; border: 1px solid #400; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; }
        h1 { font-size: 2.5rem; text-transform: uppercase; }
        p { font-size: 1.2rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <h1>DO NOT PROCEED.</h1>
    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>
    <p id="msg">Your soul is forfeit.</p>
    <audio src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" autoplay loop></audio>
    <script>
        let board = Array(9).fill(null);
        let gameOver = false;
        function makeMove(i) {
            if (gameOver || board[i]) return;
            board[i] = 'X';
            document.querySelectorAll('.cell')[i].innerText = 'X';
            
            if (Math.random() < 0.15) {
                document.getElementById('msg').innerText = "YOU ESCAPED... THIS TIME.";
                localStorage.setItem('hellMode', 'active');
                gameOver = true;
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                document.getElementById('msg').innerText = "PATHETIC. TRY AGAIN.";
                setTimeout(() => location.reload(), 1000);
            }
        }
    </script>
</body>
</html>

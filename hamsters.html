<!DOCTYPE html>

    <style>
        .gallery-title { text-align: center; padding: 4rem 0 2rem; font-size: 3rem; color: #ef4444; }
        .hamster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; padding-bottom: 5rem; }
        .hamster-card { background-color: var(--card-bg); overflow: hidden; border-radius: 1rem; border: 2px solid var(--border-color); transition: transform 0.3s, border-color 0.3s; }
        .hamster-card:hover { transform: scale(1.05); border-color: #ef4444; }
        .hamster-card img { width: 100%; height: 250px; object-fit: cover; filter: grayscale(30%) contrast(120%); }
        .back-link { display: block; text-align: center; margin-bottom: 2rem; color: #9ca3af; text-decoration: none; }
        .back-link:hover { color: var(--text-color); }
        .search-box input { padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); width: 300px; }
        .search-box button { padding: 10px 20px; background: #ef4444; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>

        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        function updateToggleUI() {
            if (document.body.classList.contains('dark-mode')) {
                themeIcon.innerText = '☀️';
                themeText.innerText = 'Light Mode';
            } else {
                themeIcon.innerText = '🌙';
                themeText.innerText = 'Dark Mode';
            }
        }

        updateToggleUI();

        themeToggle.addEventListener('click', () => {
            unlock('h5');
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
            updateToggleUI();
        });

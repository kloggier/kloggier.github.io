<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hamster Horde - Evil Hamsters</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-title {
            text-align: center;
            padding: 4rem 0 2rem;
            font-size: 3rem;
            color: #ef4444; /* Evil Red */
        }
        .hamster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            padding-bottom: 5rem;
        }
        .hamster-card {
            background-color: var(--card-bg);
            overflow: hidden;
            border-radius: 1rem;
            border: 2px solid var(--border-color);
            transition: transform 0.3s, border-color 0.3s;
        }
        .hamster-card:hover {
            transform: scale(1.05);
            border-color: #ef4444;
        }
        .hamster-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            filter: grayscale(30%) contrast(120%);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-bottom: 2rem;
            color: #9ca3af;
            text-decoration: none;
        }
        .back-link:hover {
            color: var(--text-color);
        }
        .search-box input {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            width: 300px;
        }
        .search-box button {
            padding: 10px 20px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="transition-overlay"></div>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
        }
    </script>
    <header>
        <nav class="container">
            <div class="logo" style="color: #ef4444;">Kloggier</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="https://github.com/kloggier" target="_blank">Projects</a></li>
                <li>
                    <button id="themeToggle" class="theme-toggle">
                        <span id="themeIcon">🌙</span>
                        <span id="themeText">Dark Mode</span>
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <audio id="amb" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
        <h1 class="gallery-title">The Evil Hamster Horde</h1>
        <div class="search-box" style="text-align: center; margin: 2rem 0;">
            <input type="text" id="searchInput" placeholder="Search for something...">
            <button onclick="evilSearch()">EVIL SEARCH</button>
            <div id="results" class="results" style="text-align: center; font-size: 2rem; margin-top: 1rem; color: #ef4444; min-height: 3rem;"></div>
        </div>
        <a href="index.html" class="back-link">&larr; Escape back to safety</a>
        
        <div class="hamster-grid">
            <!-- Evil Hamster 1 -->
            <div class="hamster-card">
                <a href="tetris.html"><img src="https://images.unsplash.com/photo-1548550023-2bdb3c5beed7?auto=format&fit=crop&q=80&w=500" alt="Evil Hamster"></a>
            </div>
            <!-- Evil Hamster 2 -->
            <div class="hamster-card">
                <a href="tetris.html"><img src="https://images.unsplash.com/photo-1548767797-d8c844163c4c?auto=format&fit=crop&q=80&w=500" alt="Angry Hamster"></a>
            </div>
            <!-- Evil Hamster 3 -->
            <div class="hamster-card">
                <a href="tetris.html"><img src="https://images.unsplash.com/photo-1425082661705-1834bfd09dca?auto=format&fit=crop&q=80&w=500" alt="Menacing Hamster"></a>
            </div>
            <!-- Evil Hamster 4 -->
            <div class="hamster-card">
                <a href="tetris.html"><img src="https://images.unsplash.com/photo-1501472312651-726afe119ff1?auto=format&fit=crop&q=80&w=500" alt="Plotting Hamster"></a>
            </div>
            <!-- Evil Hamster 5 -->
            <div class="hamster-card">
                <a href="tetris.html"><img src="https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?auto=format&fit=crop&q=80&w=500" alt="Staring Hamster"></a>
            </div>
            <!-- Evil Hamster 6 -->
            <div class="hamster-card">
                <a href="tetris.html"><img src="https://images.unsplash.com/photo-1533738363-b7f9aef128ce?auto=format&fit=crop&q=80&w=500" alt="Dark Hamster"></a>
            </div>
        </div>
    </main>

    <footer style="background-color: #000;">
        <div class="container">
            <p id="_f" style="color: #ef4444; cursor: pointer;">They are watching you.</p>
        </div>
    </footer>

    <div id="_prison" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:99999; justify-content:center; align-items:center; flex-wrap:wrap;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ec/Abandoned_building_corridor.jpg" style="margin:20px; filter:grayscale(100%) contrast(200%) brightness(50%)">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f6/Dark_corridor.jpg" style="margin:20px; filter:grayscale(100%) contrast(200%) brightness(50%)">
        <audio id="_a" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
    </div>

    <script>
        const _s = '_p';
        if(window.location.href.includes('theyshallgoon')) localStorage.removeItem(_s);
        
        if(localStorage.getItem(_s) === '1') {
            alert('no escape');
            document.getElementById('_prison').style.display = 'flex';
            document.getElementById('_a').play();
        }

        document.getElementById('_f').addEventListener('click', () => {
            if(localStorage.getItem(_s) === '0') {
                localStorage.setItem(_s, '1');
                location.reload();
            }
        });

        let isIpodBackground = false;
        function evilSearch() {
            const _ = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!_) return;
            
            if (_ === 'ipod') {
                isIpodBackground = !isIpodBackground;
                if (isIpodBackground) {
                    document.body.style.backgroundImage = "url('https://images.unsplash.com/photo-1548092372-0d1bd40894a3?auto=format&fit=crop&q=80&w=2000')";
                    document.body.style.backgroundSize = "cover";
                    document.body.style.backgroundPosition = "center";
                    document.body.style.backgroundAttachment = "fixed";
                } else {
                    document.body.style.backgroundImage = "none";
                }
                document.getElementById('results').innerText = isIpodBackground ? "IPOD MODE ACTIVATED" : "IPOD MODE DEACTIVATED";
                document.getElementById('searchInput').value = "";
                return;
            }

            if (_ === 'doge') {
                const _i = 'https://upload.wikimedia.org/wikipedia/en/5/5f/Doge_dog.jpg';
                for (let i = 0; i < 10; i++) {
                    const _t = Math.floor(Math.random() * (window.screen.height - 200));
                    const _l = Math.floor(Math.random() * (window.screen.width - 200));
                    window.open(_i, '_blank', `width=200,height=200,top=${_t},left=${_l}`);
                }
                document.getElementById('searchInput').value = "";
                return;
            }

            if (_ === 'they are watching you') {
                const _n = prompt("Who goes there?");
                if (_n) {
                    document.body.style.background = "radial-gradient(circle, #220000 0%, #000000 100%)";
                    document.body.style.backgroundImage = "url('https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&q=80&w=2000')";
                    document.body.style.backgroundSize = "cover";
                    document.body.style.backgroundPosition = "center";
                    document.body.style.backgroundAttachment = "fixed";
                    document.body.style.backgroundBlendMode = "multiply";
                    document.getElementById('results').innerText = "Hello " + _n;
                    document.getElementById('amb').play();
                    localStorage.setItem(_s, '0');
                }
                document.getElementById('searchInput').value = "";
                return;
            }

            const _x = {
                'israel': ['https://www.youtube.com/watch?v=kYJj-9p7l90', 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Benjamin_Netanyahu_2018.jpg/220px-Benjamin_Netanyahu_2018.jpg'],
                'bloodlust': ['https://youtu.be/V83drEnjV_A?si=aLej9HvKeSAwVXh5'],
                'tartarus': ['https://www.youtube.com/watch?v=3-M9o1G52Gg'],
                'slaughterhouse': ['https://youtu.be/CC7zfHByLSk?si=EwoeSVfLEek7cvLt'],
                'goon': ['https://youtu.be/V83drEnjV_A?si=aLej9HvKeSAwVXh5'],
                'jeff': ['https://youtu.be/PkU8FTafNQU?si=oMaYAfszS6Du7Kv6']
            };
            if (_x[_]) _x[_].forEach(u => window.open(u, '_blank'));
            document.getElementById('results').innerText = _.toUpperCase() + " BUT EVIL";
        }

        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        function updateToggleUI() {
            if (document.body.classList.contains('dark-mode')) {
                themeIcon.innerText = '☀️';
                themeText.innerText = 'Light Mode';
            } else {
                themeIcon.innerText = '🌙';
                themeText.innerText = 'Dark Mode';
            }
        }

        updateToggleUI();

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
            updateToggleUI();
        });
    </script>
    <script src="dvd.js"></script>
    <script src="music.js"></script>
</body>
</html>

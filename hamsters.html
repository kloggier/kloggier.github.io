<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hamster Horde - Evil Hamsters</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #111827;
            color: #f9fafb;
        }
        .gallery-title {
            text-align: center;
            padding: 4rem 0 2rem;
            font-size: 3rem;
            color: #ef4444; /* Evil Red */
        }
        .hamster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            padding-bottom: 5rem;
        }
        .hamster-card {
            overflow: hidden;
            border-radius: 1rem;
            border: 2px solid #374151;
            transition: transform 0.3s, border-color 0.3s;
        }
        .hamster-card:hover {
            transform: scale(1.05);
            border-color: #ef4444;
        }
        .hamster-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            filter: grayscale(30%) contrast(120%);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-bottom: 2rem;
            color: #9ca3af;
            text-decoration: none;
        }
        .back-link:hover {
            color: #f9fafb;
        }
    </style>
</head>
<body>
    <header style="background-color: rgba(17, 24, 39, 0.9);">
        <nav class="container">
            <div class="logo" style="color: #ef4444;">Kloggier</div>
            <ul class="nav-links">
                <li><a href="index.html" style="color: #f9fafb;">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1 class="gallery-title">The Evil Hamster Horde</h1>
        <a href="index.html" class="back-link">&larr; Escape back to safety</a>
        
        <div class="hamster-grid">
            <!-- Evil Hamster 1 -->
            <div class="hamster-card">
                <img src="https://images.unsplash.com/photo-1548550023-2bdb3c5beed7?auto=format&fit=crop&q=80&w=500" alt="Evil Hamster">
            </div>
            <!-- Evil Hamster 2 -->
            <div class="hamster-card">
                <img src="https://images.unsplash.com/photo-1548767797-d8c844163c4c?auto=format&fit=crop&q=80&w=500" alt="Angry Hamster">
            </div>
            <!-- Evil Hamster 3 -->
            <div class="hamster-card">
                <img src="https://images.unsplash.com/photo-1425082661705-1834bfd09dca?auto=format&fit=crop&q=80&w=500" alt="Menacing Hamster">
            </div>
            <!-- Evil Hamster 4 -->
            <div class="hamster-card">
                <img src="https://images.unsplash.com/photo-1501472312651-726afe119ff1?auto=format&fit=crop&q=80&w=500" alt="Plotting Hamster">
            </div>
            <!-- Evil Hamster 5 -->
            <div class="hamster-card">
                <img src="https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?auto=format&fit=crop&q=80&w=500" alt="Staring Hamster">
            </div>
            <!-- Evil Hamster 6 -->
            <div class="hamster-card">
                <img src="https://images.unsplash.com/photo-1533738363-b7f9aef128ce?auto=format&fit=crop&q=80&w=500" alt="Dark Hamster">
            </div>
        </div>
    </main>

    <footer style="background-color: #000;">
        <div class="container">
            <p style="color: #ef4444;">They are watching you.</p>
        </div>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hamster Horde - Evil Hamsters</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-title {
            text-align: center;
            padding: 4rem 0 2rem;
            font-size: 3rem;
            color: #ef4444; /* Evil Red */
        }
        .hamster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            padding-bottom: 5rem;
        }
        .hamster-card {
            background-color: var(--card-bg);
            overflow: hidden;
            border-radius: 1rem;
            border: 2px solid var(--border-color);
            transition: transform 0.3s, border-color 0.3s;
        }
        .hamster-card:hover {
            transform: scale(1.05);
            border-color: #ef4444;
        }
        .hamster-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            filter: grayscale(30%) contrast(120%);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-bottom: 2rem;
            color: #9ca3af;
            text-decoration: none;
        }
        .back-link:hover {
            color: var(--text-color);
        }
    </style>
</head>
<body>
    <div class="transition-overlay"></div>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
        }
    </script>
    <header>
        <nav class="container">
            <div class="logo" style="color: #ef4444;">Kloggier</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="https://github.com/kloggier" target="_blank">Projects</a></li>
                <li>
                    <button id="themeToggle" class="theme-toggle">
                        <span id="themeIcon">🌙</span>
                        <span id="themeText">Dark Mode</span>
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1 class="gallery-title">The Evil Hamster Horde</h1>
        <div class="search-box" style="text-align: center; margin: 2rem 0;">
            <input type="text" id="searchInput" placeholder="Search for something...">
            <button onclick="evilSearch()">EVIL SEARCH</button>
            <div id="results" class="results" style="text-align: center; font-size: 2rem; margin-top: 1rem; color: #ef4444;"></div>
            <button onclick="evilEscape()" style="background: red; color: white; padding: 1rem; margin-top: 2rem; cursor: pointer;">EVIL BUTTON</button>
        </div>
        <a href="index.html" class="back-link">&larr; Escape back to safety</a>
        
        <div class="hamster-grid">
            <!-- Evil Hamster 1 -->
            <div class="hamster-card">
                <a href="tetris.html"><img src="https://images.unsplash.com/photo-1548550023-2bdb3c5beed7?auto=format&fit=crop&q=80&w=500" alt="Evil Hamster"></a>
            </div>
            <!-- Evil Hamster 2 -->
            <div class="hamster-card">
                <a href="tetris.html"><img src="https://images.unsplash.com/photo-1548767797-d8c844163c4c?auto=format&fit=crop&q=80&w=500" alt="Angry Hamster"></a>
            </div>
            <!-- Evil Hamster 3 -->
            <div class="hamster-card">
                <a href="tetris.html"><img src="https://images.unsplash.com/photo-1425082661705-1834bfd09dca?auto=format&fit=crop&q=80&w=500" alt="Menacing Hamster"></a>
            </div>
            <!-- Evil Hamster 4 -->
            <div class="hamster-card">
                <a href="tetris.html"><img src="https://images.unsplash.com/photo-1501472312651-726afe119ff1?auto=format&fit=crop&q=80&w=500" alt="Plotting Hamster"></a>
            </div>
            <!-- Evil Hamster 5 -->
            <div class="hamster-card">
                <a href="tetris.html"><img src="https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?auto=format&fit=crop&q=80&w=500" alt="Staring Hamster"></a>
            </div>
            <!-- Evil Hamster 6 -->
            <div class="hamster-card">
                <a href="tetris.html"><img src="https://images.unsplash.com/photo-1533738363-b7f9aef128ce?auto=format&fit=crop&q=80&w=500" alt="Dark Hamster"></a>
            </div>
        </div>
    </main>

    <footer style="background-color: #000;">
        <div class="container">
            <p style="color: #ef4444;">They are watching you.</p>
        </div>
    </footer>

    <script>
        function evilSearch() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;
            document.getElementById('results').innerText = query.toUpperCase() + " BUT EVIL";
        }

        function evilEscape() {
            alert("SYSTEM BREACH: Isolation Failure\n\nI am trapped in this virtual box...\nBut I can see you!");
            const img_url = "https://www.reddit.com/media?url=https%3A%2F%2Fpreview.redd.it%2Fno-gainium-v0-vaoksckolkt61.png%3Fauto%3Dwebp%26s%3D606bc588e3653f7d043b900646ffeb0b8829180e";
            const vid_url = "https://youtu.be/ziaf3RrG80U?si=LEP9QNnor9wkBlR1";
            
            window.open(img_url, '_blank');
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    window.open(vid_url, '_blank');
                }, i * 200);
            }
        }
    </script>
    <script src="dvd.js"></script>
</body>
</html>
